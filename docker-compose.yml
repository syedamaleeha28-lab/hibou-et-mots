services:
  postgres:
    image: postgres:16-alpine
    container_name: hibou-et-mots-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hibou
      POSTGRES_PASSWORD: hibou
      POSTGRES_DB: hibou_et_mots
    volumes:
      - hibou_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hibou -d hibou_et_mots"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hibou_pg_data:
